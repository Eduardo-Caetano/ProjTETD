services:
  - type: web
    name: moneyscope-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ASPNETCORE_URLS
        value: http://+:10000

  - type: web
    name: moneyscope-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
