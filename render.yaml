services:
  - type: web
    name: moneyscope-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ASPNETCORE_URLS
        value: http://+:10000

  - type: web
    name: moneyscope-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
